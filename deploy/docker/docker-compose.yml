name: ${COMPOSE_PROJECT_NAME:-sentinelmail}

x-restart: &default-restart
  restart: unless-stopped

networks:
  sentinelmail:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  clamav_data:
  rspamd_data:
  postfix_spool:
  postfix_data:
  caddy_data:    # persists Let's Encrypt account + issued certs across restarts
  caddy_config:

services:
  postgres:
    <<: *default-restart
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinelmail}
      POSTGRES_USER: ${POSTGRES_USER:-sentinelmail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [sentinelmail]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinelmail} -d ${POSTGRES_DB:-sentinelmail}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    <<: *default-restart
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks: [sentinelmail]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  clamav:
    <<: *default-restart
    image: clamav/clamav:1.4
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
      CLAMAV_NO_CLAMD: "false"
    volumes:
      - clamav_data:/var/lib/clamav
    networks: [sentinelmail]
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  rspamd:
    <<: *default-restart
    build:
      context: ./rspamd
    depends_on:
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    environment:
      RSPAMD_PASSWORD: ${RSPAMD_PASSWORD:?rspamd password required}
      RSPAMD_CONTROLLER_PASSWORD: ${RSPAMD_CONTROLLER_PASSWORD:?rspamd controller password required}
      # Auto-trigger the MVP 2 scan pipeline from real mail flow.
      # Lua snippet (lua.local.d/smg_ingest.lua) no-ops when empty.
      SMG_INGEST_HMAC_KEY: ${SMG_INGEST_HMAC_KEY:-}
    volumes:
      - rspamd_data:/var/lib/rspamd
    networks: [sentinelmail]
    ports:
      - "11334:11334"
    healthcheck:
      test: ["CMD", "rspamadm", "control", "stat"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  postfix:
    <<: *default-restart
    build:
      context: ./postfix
    depends_on:
      rspamd:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      POSTFIX_MYHOSTNAME: ${POSTFIX_MYHOSTNAME:?postfix hostname required}
      POSTFIX_MYNETWORKS: ${POSTFIX_MYNETWORKS:-127.0.0.0/8 10.0.0.0/8}
      # Used by entrypoint.sh to render /etc/postfix/pgsql-*.cf so postfix
      # can read domains + gateways from the api's database.
      POSTGRES_USER: ${POSTGRES_USER:-sentinelmail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required}
      POSTGRES_DB: ${POSTGRES_DB:-sentinelmail}
      SMG_INGEST_HMAC_KEY: ${SMG_INGEST_HMAC_KEY:-}
      SMG_SMTP_EVENT_URL: http://api:8080/api/v1/smtp/events
    volumes:
      - postfix_spool:/var/spool/postfix
      - postfix_data:/var/lib/postfix
    networks: [sentinelmail]
    ports:
      # SMG_SMTP_LISTEN_IP lets hosts with a system MTA on 127.0.0.1:25
      # (e.g. exim4 on Debian docker hosts) bind to an external IP instead
      # of 0.0.0.0. Defaults to 0.0.0.0 for portability.
      - "${SMG_SMTP_LISTEN_IP:-0.0.0.0}:${SMG_SMTP_PORT:-25}:25"
      - "${SMG_SUBMISSION_PORT:-587}:587"
    healthcheck:
      test: ["CMD-SHELL", "postfix status >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    <<: *default-restart
    build:
      context: ../..
      dockerfile: deploy/docker/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SMG_HTTP_ADDR: ":8080"
      SMG_DATABASE_URL: postgres://${POSTGRES_USER:-sentinelmail}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sentinelmail}?sslmode=disable
      SMG_REDIS_URL: redis://redis:6379/0
      SMG_SESSION_SECRET: ${API_SESSION_SECRET:?session secret required (openssl rand -hex 32)}
      SMG_AUDIT_HMAC_KEY: ${API_AUDIT_HMAC_KEY:?audit hmac key required (openssl rand -hex 32)}
      SMG_INGEST_HMAC_KEY: ${SMG_INGEST_HMAC_KEY:-}
      SMG_ENV: ${SMG_ENV:-docker}
      # Optional: pre-set the seeded super-admin. If unset on first run,
      # seed generates a random password and prints it on stdout. Ignored
      # on re-seed because seed exits early when an org already exists.
      SMG_SEED_ADMIN_EMAIL: ${SMG_SEED_ADMIN_EMAIL:-}
      SMG_SEED_ADMIN_PASSWORD: ${SMG_SEED_ADMIN_PASSWORD:-}
    networks: [sentinelmail]
    ports:
      - "${SMG_API_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD", "/app/api", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    <<: *default-restart
    build:
      context: ../..
      dockerfile: deploy/docker/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    networks: [sentinelmail]
    ports:
      # Still exposed on the host so admins can reach the SPA directly
      # without going through Caddy (useful for plain-HTTP dev).
      - "${SMG_HTTP_PORT:-8080}:8080"
    healthcheck:
      # 127.0.0.1 forces IPv4 — busybox wget tries ::1 first on `localhost`
      # and nginx in this image binds IPv4 only.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  caddy:
    <<: *default-restart
    build:
      context: ./caddy
    depends_on:
      web:
        condition: service_healthy
    networks: [sentinelmail]
    ports:
      # 80 is needed for both plain-HTTP serving (TLS_MODE=off) and the
      # ACME http-01 challenge (TLS_MODE=lets_encrypt). 443 for HTTPS.
      - "${SMG_CADDY_HTTP_PORT:-80}:80"
      - "${SMG_CADDY_HTTPS_PORT:-443}:443"
    environment:
      TLS_MODE: ${TLS_MODE:-off}
      TLS_HOSTNAME: ${TLS_HOSTNAME:-}
      TLS_ACME_EMAIL: ${TLS_ACME_EMAIL:-}
    volumes:
      - caddy_data:/data       # ACME account, issued certs
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  worker:
    <<: *default-restart
    build:
      context: ../..
      dockerfile: deploy/docker/worker/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      SMG_API_BASE: http://api:8080
      SMG_REDIS_URL: redis://redis:6379/0
      SMG_INGEST_HMAC_KEY: ${SMG_INGEST_HMAC_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SMG_AI_MODEL: ${SMG_AI_MODEL:-claude-haiku-4-5-20251001}
    networks: [sentinelmail]
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  sandbox:
    <<: *default-restart
    build:
      context: ../..
      dockerfile: deploy/docker/sandbox-worker/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      SMG_API_BASE: http://api:8080
      SMG_REDIS_URL: redis://redis:6379/0
      SMG_INGEST_HMAC_KEY: ${SMG_INGEST_HMAC_KEY:-}
    networks: [sentinelmail]
    # Chromium wants more shared memory than the default 64m or it crashes
    # on heavier pages.
    shm_size: 1gb
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
