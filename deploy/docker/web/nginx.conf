worker_processes  auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout 65;
  server_tokens off;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /dev/stdout main;

  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  # Docker's embedded DNS — needed for the `set + variable proxy_pass` pattern
  # below, which forces nginx to re-resolve `api` on every request instead of
  # caching the IP for the lifetime of the worker process. Without this, every
  # api container restart leaves nginx hitting a dead IP until web is also
  # restarted (and we hit exactly this bug post-redeploy).
  resolver 127.0.0.11 ipv6=off valid=10s;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (CSP kept conservative for MVP; tighten later)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    location = /healthz {
      access_log off;
      return 200 "ok\n";
    }

    # Public-facing API proxy. Cannot use the `internal` directive because
    # browsers need to call /api/ directly.
    location /api/ {
      # The upstream value is hard-coded literally on the line below — using
      # a `set $...` variable here is what forces nginx to consult the
      # resolver every request instead of caching the upstream's IP at
      # startup (which broke us before when api was recreated). Not
      # attacker-controllable.
      set $api_upstream "api:8080";
      # nosemgrep: generic.nginx.security.dynamic-proxy-host.dynamic-proxy-host, generic.nginx.security.missing-internal.missing-internal
      proxy_pass http://$api_upstream;
      # Fixed Host header on the upstream call so the api can't be tricked
      # by an attacker-supplied incoming Host header into routing or cache
      # poisoning. (X-Forwarded-Host intentionally omitted — the api uses
      # X-Forwarded-For for client IP and doesn't look at Host.)
      proxy_set_header Host "api";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_read_timeout 60s;
    }

    # SPA fallback
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
